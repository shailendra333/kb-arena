# This is the HuggingFace Space metadata file. To deploy:
#   1. Create a new HF Space (Docker SDK)
#   2. Push this repo into the Space's git remote
#   3. The Dockerfile in this repo runs uvicorn on port 8000
#   4. The Space will start in DEMO MODE automatically because no API keys are
#      set in the Space environment — the dashboard, /api/leaderboard,
#      /api/benchmark/results work read-only; chat/arena/tools return 503.
#
# To enable live chat on a private Space, set these as secrets in the Space settings:
#   KB_ARENA_ANTHROPIC_API_KEY  (or KB_ARENA_OPENAI_API_KEY)
#   KB_ARENA_API_TOKEN          (then visitors must include Authorization header)
#   KB_ARENA_DEMO_MODE=false
#
# Public Spaces SHOULD keep KB_ARENA_DEMO_MODE=true to avoid credit drainage.
